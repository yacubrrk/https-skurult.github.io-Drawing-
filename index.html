<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="High-performance HTML5 drawing application with advanced optimizations">
    <title>Optimized Drawing App</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="styles.css" as="style">
    <link rel="preload" href="app.js" as="script">
    
    <!-- Critical CSS inlined for faster rendering -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        
        .toolbar {
            width: 60px;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            z-index: 1000;
        }
        
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #drawingCanvas {
            display: block;
            cursor: crosshair;
            background: white;
            touch-action: none;
        }
        
        .tool-btn {
            width: 40px;
            height: 40px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            background: #34495e;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .tool-btn:hover, .tool-btn.active {
            background: #3498db;
        }
        
        .tool-btn:active {
            transform: scale(0.95);
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #666;
        }
    </style>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <button class="tool-btn active" data-tool="pen" title="Pen">✏️</button>
            <button class="tool-btn" data-tool="eraser" title="Eraser">🧽</button>
            <button class="tool-btn" data-tool="line" title="Line">📏</button>
            <button class="tool-btn" data-tool="rectangle" title="Rectangle">⬜</button>
            <button class="tool-btn" data-tool="circle" title="Circle">⭕</button>
            <div style="width: 30px; height: 1px; background: #555; margin: 10px 0;"></div>
            <input type="color" class="tool-btn" id="colorPicker" value="#000000" title="Color">
            <input type="range" class="tool-btn" id="brushSize" min="1" max="50" value="5" title="Brush Size">
            <div style="width: 30px; height: 1px; background: #555; margin: 10px 0;"></div>
            <button class="tool-btn" id="undoBtn" title="Undo">↶</button>
            <button class="tool-btn" id="redoBtn" title="Redo">↷</button>
            <button class="tool-btn" id="clearBtn" title="Clear">🗑️</button>
            <button class="tool-btn" id="saveBtn" title="Save">💾</button>
        </div>
        
        <div class="canvas-container">
            <canvas id="drawingCanvas"></canvas>
        </div>
    </div>
    
    <div class="loading" id="loadingIndicator">Loading optimized drawing engine...</div>
    
    <!-- Load non-critical JavaScript asynchronously -->
    <script src="app.js" defer></script>
    
    <!-- Service Worker registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(error => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
